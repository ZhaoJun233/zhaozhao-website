locale: zh_Hans
local_backend:
  url: http://127.0.0.1:8081/api/v1

backend:
  name: git-gateway
  branch: master

site_url: http://127.0.0.1:4321
display_url: http://127.0.0.1:4321

media_folder: mizuki-blog/src/assets/uploads
public_folder: ../../assets/uploads

slug:
  encoding: unicode
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: mizuki-blog/src/content/posts
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} · {{publishedAt}}"
    sortable_fields: [publishedAt, title, category]
    view_filters:
      - label: 草稿
        field: draft
        pattern: true
      - label: 已精选
        field: featured
        pattern: true
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 摘要, name: description, widget: text }
      - { label: 发布时间, name: publishedAt, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: 更新时间, name: updatedAt, widget: datetime, date_format: YYYY-MM-DD, time_format: false, required: false }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 精选, name: featured, widget: boolean, default: false }
      - label: 分类
        name: category
        widget: relation
        collection: taxonomy
        file: categories
        search_fields: [categories.*.name]
        value_field: categories.*.name
        display_fields: [categories.*.name]
        hint: 分类选项可在左侧“分类管理”中新增、重命名和排序
      - { label: 标签, name: tags, widget: list, min: 1, max: 8 }
      - { label: 系列, name: series, widget: string, required: false }
      - { label: 封面, name: cover, widget: image, required: false }
      - { label: 封面说明, name: coverAlt, widget: string, required: false, hint: 添加封面时请填写 }
      - label: 原文链接
        name: canonicalUrl
        widget: string
        required: false
        pattern: ['^https?://\S+$', '仅支持以 http:// 或 https:// 开头的链接']
      - { label: 正文, name: body, widget: markdown }

  - name: projects
    label: 项目
    label_singular: 项目
    folder: mizuki-blog/src/content/projects
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 摘要, name: description, widget: text }
      - { label: 日期, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - label: 状态
        name: status
        widget: select
        options:
          - { label: 进行中, value: active }
          - { label: 已完成, value: completed }
          - { label: 已归档, value: archived }
      - { label: 标签, name: tags, widget: list, min: 1, max: 6 }
      - { label: 精选, name: featured, widget: boolean, default: false }
      - { label: 封面, name: cover, widget: image, required: false }
      - label: 仓库地址
        name: repositoryUrl
        widget: string
        required: false
        pattern: ['^https?://\S+$', '仅支持以 http:// 或 https:// 开头的链接']
      - label: 演示地址
        name: demoUrl
        widget: string
        required: false
        pattern: ['^https?://\S+$', '仅支持以 http:// 或 https:// 开头的链接']
      - { label: 正文, name: body, widget: markdown }

  - name: settings
    label: 站点设置
    media_folder: /mizuki-blog/src/assets/profile
    public_folder: /src/assets/profile
    files:
      - name: profile
        label: 博主资料
        file: mizuki-blog/src/data/profile.json
        format: json
        fields:
          - { label: 昵称, name: name, widget: string }
          - { label: 站点副标题, name: siteTitle, widget: string }
          - { label: 网站描述, name: description, widget: text }
          - { label: 个人简介, name: bio, widget: text }
          - { label: 头像, name: avatar, widget: image, hint: 保存后博客会自动热更新 }

  - name: page_content
    label: 页面内容
    files:
      - name: navigation
        label: 导航与页脚
        file: mizuki-blog/src/data/navigation.json
        format: json
        fields:
          - label: 主导航
            name: items
            widget: list
            min: 1
            max: 12
            summary: "{{fields.label}} · {{fields.href}}"
            hint: 可拖动调整前台导航顺序
            fields:
              - { label: 名称, name: label, widget: string }
              - { label: 站内路径, name: href, widget: string, pattern: ['^/(?!/)', '路径必须以单个 / 开头'] }
          - label: 移动端菜单
            name: mobile
            widget: object
            fields:
              - { label: 英文眉题, name: kicker, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 搜索入口, name: searchLabel, widget: string }
              - { label: 底部短句, name: note, widget: text }
          - label: 页脚
            name: footer
            widget: object
            fields:
              - { label: 导航栏标题, name: navigationLabel, widget: string }
              - { label: 其他链接标题, name: linksLabel, widget: string }
              - { label: RSS 名称, name: rssLabel, widget: string }
              - { label: 鸣谢页名称, name: creditsLabel, widget: string }
              - { label: 版权区短句, name: note, widget: text }

      - name: homepage
        label: 首页
        file: mizuki-blog/src/data/homepage.json
        format: json
        fields:
          - label: 首屏
            name: hero
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 动态文字前缀, name: typingLabel, widget: string }
              - { label: 动态短句, name: typingPhrases, widget: list, min: 1, max: 8 }
              - { label: 主按钮, name: primaryActionLabel, widget: string }
              - { label: 次按钮, name: secondaryActionLabel, widget: string }
              - { label: 向下提示, name: scrollLabel, widget: string }
          - label: 站点近况
            name: status
            widget: object
            fields:
              - { label: 状态名称, name: label, widget: string }
              - { label: 状态内容, name: message, widget: string }
              - { label: 文章统计名称, name: postsLabel, widget: string }
              - { label: 主题统计名称, name: topicsLabel, widget: string }
              - { label: 最近更新名称, name: latestLabel, widget: string }
          - label: 精选文章区
            name: featuredPosts
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 全部文章按钮, name: linkLabel, widget: string }
              - { label: 空状态, name: emptyMessage, widget: text }
          - label: 分类区
            name: topics
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 无障碍名称, name: navigationLabel, widget: string }
          - label: 精选项目区
            name: featuredProjects
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
              - { label: 项目详情按钮, name: detailLabel, widget: string }
              - { label: 全部项目按钮, name: allLabel, widget: string }
              - label: 状态名称
                name: statusLabels
                widget: object
                fields:
                  - { label: 进行中, name: active, widget: string }
                  - { label: 已完成, name: completed, widget: string }
                  - { label: 已归档, name: archived, widget: string }
          - label: 个人介绍区
            name: introduction
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 正文, name: body, widget: text }
              - { label: 关于按钮, name: primaryActionLabel, widget: string }
              - { label: 留言按钮, name: secondaryActionLabel, widget: string }
              - { label: 图片短标题, name: artworkCaption, widget: string }

      - name: about
        label: 关于页
        file: mizuki-blog/src/data/about.json
        format: json
        fields:
          - { label: 搜索摘要, name: seoDescription, widget: text }
          - label: 个人介绍
            name: hero
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 介绍正文, name: introduction, widget: text }
              - { label: 留言按钮, name: guestbookLabel, widget: string }
              - { label: RSS 按钮, name: rssLabel, widget: string }
          - label: 兴趣
            name: interests
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
              - label: 兴趣列表
                name: items
                widget: list
                min: 1
                max: 12
                summary: "{{fields.title}}"
                fields:
                  - { label: 名称, name: title, widget: string }
                  - { label: 说明, name: description, widget: text }
          - label: 常用工具
            name: workbench
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
              - { label: 工具列表, name: tools, widget: list, min: 1, max: 20 }
          - label: 时间线
            name: timeline
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
              - label: 时间节点
                name: entries
                widget: list
                max: 30
                summary: "{{fields.date}} · {{fields.title}}"
                fields:
                  - { label: 月份, name: date, widget: string, pattern: ['^\d{4}-(0[1-9]|1[0-2])$', '请使用 YYYY-MM 格式'] }
                  - { label: 标题, name: title, widget: string }
                  - { label: 说明, name: description, widget: text }

      - name: friends
        label: 友链页
        file: mizuki-blog/src/data/friends.json
        format: json
        fields:
          - { label: 搜索摘要, name: seoDescription, widget: text }
          - label: 页首
            name: hero
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
          - { label: 提示标题, name: noticeTitle, widget: string }
          - { label: 提示内容, name: notice, widget: text }
          - { label: 访问按钮, name: visitLabel, widget: string }
          - { label: 空状态标题, name: emptyTitle, widget: string }
          - { label: 空状态说明, name: emptyDescription, widget: text }
          - label: 交换友链邀请
            name: invitation
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
              - { label: 按钮, name: actionLabel, widget: string }
          - label: 友链列表
            name: links
            widget: list
            max: 100
            summary: "{{fields.name}} · {{fields.url}}"
            fields:
              - { label: 站点名称, name: name, widget: string }
              - { label: 网址, name: url, widget: string, pattern: ['^https?://\S+$', '仅支持 http:// 或 https:// 链接'] }
              - { label: 介绍, name: description, widget: text }
              - { label: 兴趣标签, name: interests, widget: list, min: 1, max: 8 }

      - name: guestbook
        label: 留言页
        file: mizuki-blog/src/data/guestbook.json
        format: json
        fields:
          - { label: 搜索摘要, name: seoDescription, widget: text }
          - label: 页首
            name: hero
            widget: object
            fields:
              - { label: 徽记文字, name: badge, widget: string }
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }
          - label: 留言约定
            name: guidelines
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 规则列表, name: items, widget: list, min: 1, max: 12 }
              - { label: 配置说明按钮, name: setupLabel, widget: string }
          - label: 讨论区
            name: discussion
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 说明, name: description, widget: text }

      - name: credits
        label: 鸣谢页
        file: mizuki-blog/src/data/credits.json
        format: json
        fields:
          - { label: 页面标题, name: title, widget: string }
          - { label: 搜索摘要, name: description, widget: text }
          - label: 页首
            name: hero
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 主标题, name: heading, widget: string }
              - { label: 页面介绍, name: introduction, widget: text }
          - label: 素材记录区
            name: artwork
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: heading, widget: string }
              - { label: 说明, name: introduction, widget: text }
              - { label: 来源按钮, name: sourceLinkLabel, widget: string }
          - label: 开源项目区
            name: libraries
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: heading, widget: string }
              - { label: 链接按钮, name: linkLabel, widget: string }
              - label: 项目列表
                name: items
                widget: list
                min: 1
                max: 30
                summary: "{{fields.name}} · {{fields.license}}"
                fields:
                  - { label: 名称, name: name, widget: string }
                  - { label: 用途, name: role, widget: string }
                  - { label: 许可证, name: license, widget: string }
                  - { label: 网址, name: url, widget: string, pattern: ['^https?://\S+$', '仅支持 http:// 或 https:// 链接'] }
          - label: 讨论区配置
            name: discussionSetup
            widget: object
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: heading, widget: string }
              - { label: 说明, name: introduction, widget: text }
              - label: 配置步骤
                name: steps
                widget: list
                min: 1
                max: 12
                summary: "{{fields.title}}"
                fields:
                  - { label: 标题, name: title, widget: string }
                  - { label: 说明, name: description, widget: text }

      - name: page_copy
        label: 索引页文案
        file: mizuki-blog/src/data/page-copy.json
        format: json
        fields:
          - label: 文章索引
            name: posts
            widget: object
            fields: &index_page_fields
              - { label: 页面标题, name: title, widget: string }
              - { label: 搜索摘要, name: description, widget: text }
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 主标题, name: heading, widget: string }
              - { label: 页面介绍, name: introduction, widget: text, required: false }
              - { label: 空状态标题, name: emptyTitle, widget: string, required: false }
              - { label: 空状态说明, name: emptyDescription, widget: text, required: false }
          - { label: 归档页, name: archive, widget: object, fields: *index_page_fields }
          - { label: 分类页, name: categories, widget: object, fields: *index_page_fields }
          - { label: 标签页, name: tags, widget: object, fields: *index_page_fields }
          - label: 项目页
            name: projects
            widget: object
            fields:
              - { label: 页面标题, name: title, widget: string }
              - { label: 搜索摘要, name: description, widget: text }
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 主标题, name: heading, widget: string }
              - { label: 页面介绍, name: introduction, widget: text }
              - { label: 空状态标题, name: emptyTitle, widget: string }
              - { label: 空状态说明, name: emptyDescription, widget: text }
              - { label: 筛选空状态标题, name: filteredEmptyTitle, widget: string }
              - { label: 筛选空状态说明, name: filteredEmptyDescription, widget: text }
          - { label: 搜索页, name: search, widget: object, fields: *index_page_fields }
          - label: 404 页面
            name: notFound
            widget: object
            fields:
              - { label: 页面标题, name: title, widget: string }
              - { label: 搜索摘要, name: description, widget: text }
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 主标题, name: heading, widget: string }
              - { label: 页面介绍, name: introduction, widget: text }
              - { label: 首页按钮, name: homeLabel, widget: string }
              - { label: 搜索按钮, name: searchLabel, widget: string }
              - { label: 最近文章眉题, name: recentEyebrow, widget: string }
              - { label: 最近文章标题, name: recentTitle, widget: string }

  - name: visuals
    label: 视觉素材
    media_folder: /mizuki-blog/src/assets/backgrounds
    public_folder: /src/assets/backgrounds
    files:
      - name: artwork
        label: 首页与关于页插画
        file: mizuki-blog/src/data/artwork.json
        format: json
        fields:
          - label: 首页主视觉
            name: homeHero
            widget: object
            fields:
              - { label: 图片, name: image, widget: image }
              - { label: 素材名称, name: title, widget: string }
              - { label: 图片说明, name: alt, widget: string }
          - label: 关于页与首页介绍图
            name: aboutSummerDream
            widget: object
            fields:
              - { label: 图片, name: image, widget: image }
              - { label: 素材名称, name: title, widget: string }
              - { label: 图片说明, name: alt, widget: string }
              - { label: 来源链接, name: sourceUrl, widget: string, pattern: ['^https?://\S+$', '仅支持 http:// 或 https:// 链接'] }
              - { label: 上传者, name: uploader, widget: string }
              - { label: BV 号或来源编号, name: bvid, widget: string }

  - name: taxonomy
    label: 分类管理
    files:
      - name: categories
        label: 文章分类
        file: mizuki-blog/src/data/taxonomy.json
        format: json
        fields:
          - label: 分类列表
            name: categories
            widget: list
            summary: "{{fields.name}}"
            hint: 可拖动排序；重命名后，请在旧文章中重新选择该分类
            fields:
              - { label: 分类名称, name: name, widget: string }
              - { label: 分类说明, name: description, widget: text, required: false }
