services:
  site:
    build:
      context: .
      target: runtime
      args:
        PUBLIC_SITE_URL: http://127.0.0.1:4321
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "4321"
      CONTENT_ROOT: /app/src
      PUBLIC_SITE_URL: http://127.0.0.1:4321
      PUBLIC_GISCUS_REPO: ${PUBLIC_GISCUS_REPO:-}
      PUBLIC_GISCUS_REPO_ID: ${PUBLIC_GISCUS_REPO_ID:-}
      PUBLIC_GISCUS_CATEGORY: ${PUBLIC_GISCUS_CATEGORY:-}
      PUBLIC_GISCUS_CATEGORY_ID: ${PUBLIC_GISCUS_CATEGORY_ID:-}
    ports:
      - "127.0.0.1:4321:4321"
    volumes:
      - ./src/data:/app/src/data:ro
      - ./src/content:/app/src/content:ro
      - ./src/assets:/app/src/assets:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4321/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6

  cms:
    build:
      context: .
      target: authoring
    init: true
    restart: unless-stopped
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    command: npm run cms
    environment:
      BIND_HOST: 0.0.0.0
      GIT_REPO_DIRECTORY: /workspace
      MODE: fs
      ORIGIN: http://127.0.0.1:4321
      PORT: "8081"
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./src/content:/workspace/mizuki-blog/src/content
      - ./src/data:/workspace/mizuki-blog/src/data
      - ./src/assets/profile:/workspace/mizuki-blog/src/assets/profile
      - ./src/assets/backgrounds:/workspace/mizuki-blog/src/assets/backgrounds
      - ./src/assets/uploads:/workspace/mizuki-blog/src/assets/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:8081/api/v1',{method:'POST',headers:{'content-type':'application/json','origin':'http://127.0.0.1:4321'},body:JSON.stringify({action:'info'})}).then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6
