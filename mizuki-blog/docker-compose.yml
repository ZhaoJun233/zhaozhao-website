services:
  builder:
    build:
      context: .
      target: authoring
    init: true
    restart: unless-stopped
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    command: node scripts/watch-site.mjs
    environment:
      BUILD_MODE: production
      POLL_INTERVAL_MS: "1000"
      PUBLIC_SITE_URL: http://127.0.0.1:4321
      SITE_ROOT: /site
      PUBLIC_GISCUS_REPO: ${PUBLIC_GISCUS_REPO:-}
      PUBLIC_GISCUS_REPO_ID: ${PUBLIC_GISCUS_REPO_ID:-}
      PUBLIC_GISCUS_CATEGORY: ${PUBLIC_GISCUS_CATEGORY:-}
      PUBLIC_GISCUS_CATEGORY_ID: ${PUBLIC_GISCUS_CATEGORY_ID:-}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - site-data:/site
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - require('node:fs').accessSync('/site/current/index.html')
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 12

  site:
    build:
      context: .
      target: dynamic
    init: true
    restart: unless-stopped
    depends_on:
      builder:
        condition: service_healthy
    ports:
      - "127.0.0.1:4321:8080"
    volumes:
      - site-data:/site:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6

  cms:
    build:
      context: .
      target: authoring
    init: true
    restart: unless-stopped
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /app
    command: npm run cms
    environment:
      BIND_HOST: 0.0.0.0
      GIT_REPO_DIRECTORY: /workspace
      MODE: fs
      ORIGIN: http://127.0.0.1:4321
      PORT: "8081"
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - ./src/content:/workspace/mizuki-blog/src/content
      - ./src/data:/workspace/mizuki-blog/src/data
      - ./src/assets/profile:/workspace/mizuki-blog/src/assets/profile
      - ./src/assets/uploads:/workspace/mizuki-blog/src/assets/uploads
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:8081/api/v1',{method:'POST',headers:{'content-type':'application/json','origin':'http://127.0.0.1:4321'},body:JSON.stringify({action:'info'})}).then(response=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6

volumes:
  site-data:
