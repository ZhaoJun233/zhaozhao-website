services:
  site:
    build:
      context: .
      target: runtime
      args:
        PUBLIC_SITE_URL: http://127.0.0.1:4321
    init: true
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "4321"
      CONTENT_ROOT: /app/src
      BLOG_DATABASE_PATH: /app/storage/blog.sqlite
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-233zhao-local-admin}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-this-local-session-secret}
      PUBLIC_SITE_URL: http://127.0.0.1:4321
      PUBLIC_GISCUS_REPO: ${PUBLIC_GISCUS_REPO:-}
      PUBLIC_GISCUS_REPO_ID: ${PUBLIC_GISCUS_REPO_ID:-}
      PUBLIC_GISCUS_CATEGORY: ${PUBLIC_GISCUS_CATEGORY:-}
      PUBLIC_GISCUS_CATEGORY_ID: ${PUBLIC_GISCUS_CATEGORY_ID:-}
    ports:
      - "127.0.0.1:4321:4321"
    volumes:
      - ./src/data:/app/src/data:ro
      - ./src/content:/app/src/content:ro
      - ./src/assets:/app/src/assets:ro
      - blog-data:/app/storage
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4321/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6

volumes:
  blog-data:
